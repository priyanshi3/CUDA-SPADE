# CUDA-SPADE Configuration
#
# mode: "demo"  — synthetic sensors, faults injected automatically (no hardware needed)
# mode: "live"  — read from real PLC via Modbus TCP
#
# DEMO WORKFLOW (two terminals, no hardware):
#   Terminal 1:  python plc_sim.py   <- software PLC
#   Terminal 2:  python monitor.py   <- GPU monitor
#
# LIVE WORKFLOW (real PLC):
#   1. Set mode: live
#   2. Set host: <PLC IP> and port: 502 under each sensor
#   3. python monitor.py

mode: demo             # change to "live" to connect real PLC
poll_interval_s: 2.0   # seconds between detection cycles

# ── Sensors ───────────────────────────────────────────────────────────────────
# register_start and sample_count define where in the PLC register bank
# this sensor's data lives.  Must match plc_sim.py REGISTER LAYOUT comment.
sensors:

  - id: motor_temp
    name: "Motor Temperature"
    sensor_type: temperature
    unit: "C"
    sample_rate_hz: 100
    baseline: 65.0
    noise: 0.3
    detection:
      algorithm: zscore
      window: 100
      threshold: 3.0
    # PLC connection (used when mode: live):
    host: localhost        # change to real PLC IP e.g. 192.168.1.100
    port: 5020             # 5020 = plc_sim.py,  502 = real PLC
    register_start: 0      # first register in PLC holding-register bank
    sample_count: 200      # how many float samples to read per cycle
    slave_id: 1            # Modbus unit ID (almost always 1)

  - id: bearing_vib
    name: "Bearing Vibration"
    sensor_type: vibration
    unit: "m/s2"
    sample_rate_hz: 1000
    baseline: 0.0
    noise: 0.05
    detection:
      algorithm: fft
      threshold_multiplier: 5.0
    # PLC connection:
    host: localhost
    port: 5020
    register_start: 400    # 200 samples × 2 regs = 400 regs after motor_temp
    sample_count: 1000     # 1 second of vibration data at 1 kHz
    slave_id: 1

  - id: hydraulic_pres
    name: "Hydraulic Pressure"
    sensor_type: pressure
    unit: "bar"
    sample_rate_hz: 100
    baseline: 180.0
    noise: 1.5
    detection:
      algorithm: zscore
      window: 100
      threshold: 3.5
    # PLC connection:
    host: localhost
    port: 5020
    register_start: 2400   # 400 + 1000×2 = 2400
    sample_count: 200
    slave_id: 1

  - id: motor_current
    name: "Motor Current"
    sensor_type: current
    unit: "A"
    sample_rate_hz: 100
    baseline: 12.5
    noise: 0.15
    detection:
      algorithm: zscore
      window: 100
      threshold: 3.0
    # PLC connection:
    host: localhost
    port: 5020
    register_start: 2800   # 2400 + 200×2 = 2800
    sample_count: 200
    slave_id: 1

# ── Alerts ────────────────────────────────────────────────────────────────────
alerts:
  log_file: "logs/spade_alerts.log"

# ── Demo settings ─────────────────────────────────────────────────────────────
demo:
  # Fault injected every N cycles.  At 2 s/cycle → every 30 s.
  # Rotation: motor_temp → bearing_vib → hydraulic_pres → motor_current → repeat
  fault_injection_interval_cycles: 15
